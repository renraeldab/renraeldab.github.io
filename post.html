<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post - My Blog</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Lato:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h1 class="site-title"><a href="/">My Blog</a></h1>
            <p class="site-description">Thoughts, stories, and ideas</p>
        </div>
    </header>

    <main class="container">
        <article id="post-content" class="post">
            <p class="loading">Loading post...</p>
        </article>

        <nav class="post-nav">
            <a href="/" class="back-link">← Back to all posts</a>
        </nav>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2025 My Blog</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/blog.js?v=2"></script>
    <script>
        loadPost();
    </script>
</body>
</html>
